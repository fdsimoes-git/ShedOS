name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Use the Claude Code OAuth token (same flow as the local CLI's
          # `claude setup-token`). Avoids provisioning a separate pay-as-you-
          # go API key — usage goes against your Claude subscription.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Read CLAUDE.md and
            .github/CODE_REVIEW.md if present and follow their standards.
            Focus on: correctness bugs, security issues, missing error
            handling, missing tests, and breaking changes for callers.
            Be specific and terse.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 15
