name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  # Comment events fire on every comment — the job's `if:` clause below
  # filters to @claude mentions only so we don't spin up a fresh review
  # (~$0.50-1.50 each) for every CodeQL / Copilot / bot comment.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Always run on pull_request events (opens / pushes — there's no
    # comment body to filter on). For comment events, only run when the
    # comment mentions @claude. The issue.pull_request check also skips
    # issue_comment events on issues that aren't PRs.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Use the Claude Code OAuth token (same flow as the local CLI's
          # `claude setup-token`). Avoids provisioning a separate pay-as-you-
          # go API key — usage goes against your Claude subscription.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Read CLAUDE.md and
            .github/CODE_REVIEW.md if present and follow their standards.
            Focus on: correctness bugs, security issues, missing error
            handling, missing tests, and breaking changes for callers.
            Be specific and terse.

            How to leave feedback (REQUIRED — without these tool calls
            the review goes nowhere and the PR author sees nothing):

            - For each blocking issue tied to a specific line, call
              `mcp__github_inline_comment__create_inline_comment` with
              the file path, the side ("RIGHT" for the new version),
              the line number, and a short body: one line stating the
              problem, one line stating the fix. Keep each under 4
              lines. One issue per call.
            - When you're done reading the diff, post EXACTLY one
              top-level summary comment via
              `mcp__github__create_issue_comment` against PR
              ${{ github.event.pull_request.number }}. The summary
              must EITHER list the blocking issues you flagged inline
              OR say literally "No blocking issues." Always post the
              summary — silence isn't an acceptable outcome; the PR
              author needs to know the review ran.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 30
