name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  # Comment events fire on every comment — the job's `if:` clause below
  # filters to @claude mentions only so we don't spin up a fresh review
  # (~$0.50-1.50 each) for every CodeQL / Copilot / bot comment.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Always run on pull_request events (opens / pushes — there's no
    # comment body to filter on). For comment events, only run when the
    # comment mentions @claude. The issue.pull_request check also skips
    # issue_comment events on issues that aren't PRs.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Use the Claude Code OAuth token (same flow as the local CLI's
          # `claude setup-token`). Avoids provisioning a separate pay-as-you-
          # go API key — usage goes against your Claude subscription.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Consolidate the entire review into one sticky top-level
          # comment that updates in place on every push. Earlier
          # iterations tried to wire up inline-comment posting via
          # MCP tools but kept hitting permission_denials_count: 7
          # because the action's tool allowlist doesn't include them
          # by default and naming them in --allowedTools didn't help
          # either. The sticky-comment path is documented and bypasses
          # all that machinery.
          use_sticky_comment: true
          prompt: |
            Review this pull request. Read CLAUDE.md and
            .github/CODE_REVIEW.md if present and follow their standards.
            Focus on: correctness bugs, security issues, missing error
            handling, missing tests, and breaking changes for callers.
            Be specific and terse.

            Format your response as the review body — your reply IS
            the comment the action will post (via use_sticky_comment).
            Lead with either:
              - "## Blocking issues" + a bulleted list with
                `path:line` + the problem + the fix (one bullet per
                issue), OR
              - "No blocking issues." on its own line when there's
                nothing worth blocking on.
            Then a one-paragraph summary of what the PR does and any
            non-blocking observations.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 30
