name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Read CLAUDE.md and
            .github/CODE_REVIEW.md if present and follow their standards.
            Focus on: correctness bugs, security issues, missing error
            handling, missing tests, and breaking changes for callers.
            Be specific and terse.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 15
