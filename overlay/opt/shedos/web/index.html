<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ShedOS</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <span class="brand-name">ShedOS</span>
    </div>
    <nav class="tabs" id="tabs"></nav>
    <button class="btn-icon" id="new-tab-btn" title="New tab (⌘T)">＋</button>
    <div class="status" id="status">
      <span class="dot"></span><span id="status-text">connecting…</span>
    </div>
  </header>

  <main id="main">
    <section class="chat" id="chat" aria-live="polite"></section>

    <div class="composer">
      <div class="input-wrap">
        <textarea id="input"
                  rows="1"
                  placeholder="Ask Claude anything…  (Enter to send, Shift+Enter for newline)"
                  autofocus></textarea>
        <button id="send-btn" class="btn-send" title="Send">↑</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
